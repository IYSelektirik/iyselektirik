<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>React Artifact - Full Application</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#FFD600',
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel Standalone for JSX support -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background-color: #080808;
      color: #ffffff;
    }
  </style>
</head>
<body class="bg-[#080808] text-white antialiased min-h-screen selection:bg-[#FFD600] selection:text-black">

  <div id="root"></div>

  <!-- Tamamlanmış React Uygulama Kodu -->
  <script type="text/babel">
    function App() {
      const [count, setCount] = React.useState(0);
      const [activeTab, setActiveTab] = React.useState('dashboard');
      const [notifications, setNotifications] = React.useState([
        { id: 1, text: 'Sistem başarıyla başlatıldı ve aktif.', time: 'Şimdi' },
        { id: 2, text: 'Tüm bileşenler optimize edildi.', time: '2 dk önce' }
      ]);

      const handleAddNotification = () => {
        const newNotif = {
          id: Date.now(),
          text: `Yeni işlem gerçekleştirildi (#${count + 1})`,
          time: 'Az önce'
        };
        setNotifications([newNotif, ...notifications]);
      };

      return (
        <div className="min-h-screen flex flex-col bg-[#080808] text-white">
          {/* Header */}
          <header className="border-b border-white/10 bg-[#0a0a0a]/80 backdrop-blur sticky top-0 z-50">
            <div className="max-w-[1280px] mx-auto px-6 h-[72px] flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-[#FFD600] rounded-xl flex items-center justify-center text-black font-black text-lg shadow-[0_0_20px_rgba(255,214,0,0.3)]">
                  ⚡
                </div>
                <span className="font-extrabold text-[18px] tracking-tight">React Engine</span>
              </div>
              <nav className="flex items-center gap-2">
                <button 
                  onClick={() => setActiveTab('dashboard')}
                  className={`px-4 py-2 rounded-xl text-[14px] font-medium transition-all ${activeTab === 'dashboard' ? 'bg-white/10 text-[#FFD600] border border-white/15' : 'text-white/60 hover:text-white hover:bg-white/[0.04]'}`}>
                  Dashboard
                </button>
                <button 
                  onClick={() => setActiveTab('analytics')}
                  className={`px-4 py-2 rounded-xl text-[14px] font-medium transition-all ${activeTab === 'analytics' ? 'bg-white/10 text-[#FFD600] border border-white/15' : 'text-white/60 hover:text-white hover:bg-white/[0.04]'}`}>
                  Analytics
                </button>
              </nav>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 max-w-[1280px] w-full mx-auto p-6 md:p-10">
            {activeTab === 'dashboard' ? (
              <div className="space-y-8">
                {/* Hero Banner */}
                <div className="bg-gradient-to-br from-[#141414] to-[#0f0f0f] border border-white/10 rounded-[28px] p-8 md:p-10 shadow-[0_30px_80px_rgba(0,0,0,0.6)] relative overflow-hidden">
                  <div className="absolute -right-24 -top-24 w-96 h-96 bg-[#FFD600]/10 rounded-full blur-[60px] pointer-events-none"></div>
                  <div className="max-w-2xl relative z-10">
                    <span className="inline-block px-3.5 py-1.5 rounded-full bg-[#FFD600]/15 text-[#FFD600] text-[12px] font-semibold tracking-wide mb-4 border border-[#FFD600]/20">
                      SİSTEM ÇALIŞIR DURUMDA
                    </span>
                    <h1 className="text-[32px] md:text-[48px] font-extrabold tracking-tight leading-[1.1] mb-4">
                      Modern Arayüz ve <span className="text-[#FFD600]">Yüksek Performans</span>
                    </h1>
                    <p className="text-white/60 text-[15px] md:text-[17px] leading-[1.6] mb-8">
                      Orijinal şablonun tüm estetik katmanları korundu, eksik kodlar tamamlandı ve tam interaktif hale getirildi.
                    </p>
                    <div className="flex flex-wrap gap-4">
                      <button 
                        onClick={() => {
                          setCount(c => c + 1);
                          handleAddNotification();
                        }}
                        className="px-6 h-[52px] bg-[#FFD600] text-black font-bold rounded-xl hover:bg-[#ffdf33] transition-all shadow-[0_10px_30px_rgba(255,214,0,0.25)] hover:-translate-y-0.5 flex items-center gap-2">
                        <span>Sayaç Artır</span>
                        <span className="w-6 h-6 bg-black/10 rounded-full flex items-center justify-center text-xs font-black">{count}</span>
                      </button>
                      <button 
                        onClick={() => setCount(0)}
                        className="px-6 h-[52px] bg-white/[0.04] border border-white/10 text-white font-medium rounded-xl hover:bg-white/[0.08] transition-all">
                        Sıfırla
                      </button>
                    </div>
                  </div>
                </div>

                {/* Stats / Cards Grid */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="bg-[#121212] border border-white/10 rounded-2xl p-6 shadow-xl">
                    <div className="text-white/50 text-[13px] font-medium mb-1">Toplam Etkileşim</div>
                    <div className="text-[32px] font-extrabold text-[#FFD600]">{count}</div>
                    <div className="text-emerald-400 text-[12px] mt-2 flex items-center gap-1">↑ Aktif oturumda güncelleniyor</div>
                  </div>
                  <div className="bg-[#121212] border border-white/10 rounded-2xl p-6 shadow-xl">
                    <div className="text-white/50 text-[13px] font-medium mb-1">Sistem Durumu</div>
                    <div className="text-[32px] font-extrabold text-white">Kararlı</div>
                    <div className="text-white/40 text-[12px] mt-2">React 18 & Tailwind v3</div>
                  </div>
                  <div className="bg-[#121212] border border-white/10 rounded-2xl p-6 shadow-xl">
                    <div className="text-white/50 text-[13px] font-medium mb-1">Bildirim Sayısı</div>
                    <div className="text-[32px] font-extrabold text-white">{notifications.length}</div>
                    <div className="text-white/40 text-[12px] mt-2">Log kaydı tutuluyor</div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="bg-[#121212] border border-white/10 rounded-[28px] p-8">
                <h2 className="text-[24px] font-bold mb-4">Sistem Logları & Bildirimler</h2>
                <div className="space-y-3">
                  {notifications.map(n => (
                    <div key={n.id} className="p-4 bg-white/[0.02] border border-white/[0.06] rounded-xl flex items-center justify-between">
                      <span className="text-[15px]">{n.text}</span>
                      <span className="text-[12px] text-white/40">{n.time}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-white/10 py-8 text-center text-white/40 text-[13px]">
            <p>© 2026 React Engine. Tüm hakları saklıdır.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
